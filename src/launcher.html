<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sārathi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      padding: 24px;
      user-select: none;
    }

    .wordmark {
      font-size: 22px;
      font-weight: 700;
      color: #E8621A;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: #999;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
      margin-bottom: 16px;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #E8621A; }

    button {
      width: 100%;
      padding: 10px;
      background: #E8621A;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.1s;
    }

    button:hover { background: #d4561a; }

    .hotkey-hint {
      margin-top: 14px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
    }

    .hotkey-hint kbd {
      font-family: inherit;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
      color: #666;
    }

    #error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="wordmark">Sārathi</div>
  <div class="tagline">सारथी · AI teaching co-pilot</div>

  <label>Select today's lesson</label>
  <select id="lesson-select">
    <option value="">Loading lessons…</option>
  </select>

  <button onclick="startSession()">Start session</button>

  <div id="error-msg"></div>

  <div class="hotkey-hint">
    Press <kbd>⌘ Shift Space</kbd> during class to activate
  </div>

<script>
  const { ipcRenderer } = require('electron')
  const fs = require('fs')
  const path = require('path')

  // __dirname in Electron renderer can point to the wrong place depending on
  // how the file is loaded. Use the known location of this HTML file instead.
  const thisFileDir = path.dirname(decodeURI(new URL(window.location.href).pathname))
  const lessonsDir = path.join(thisFileDir, '..', 'lessons')
  const selectEl = document.getElementById('lesson-select')
  const errorMsg = document.getElementById('error-msg')

  // Load available lesson JSON files
  function loadLessons () {
    try {
      const files = fs.readdirSync(lessonsDir).filter(f => f.endsWith('.json'))

      if (files.length === 0) {
        selectEl.innerHTML = '<option value="">No lessons found in /lessons/</option>'
        return
      }

      selectEl.innerHTML = files.map(filename => {
        const lessonJson = JSON.parse(
          fs.readFileSync(path.join(lessonsDir, filename), 'utf8')
        )
        const label = lessonJson.lesson_title && lessonJson.topics_covered
          ? `${lessonJson.lesson_title} — ${lessonJson.topics_covered}`
          : filename
        return `<option value="${filename}">${label}</option>`
      }).join('')

    } catch (err) {
      selectEl.innerHTML = '<option value="">Error loading lessons</option>'
      showError('Could not read /lessons/ directory: ' + err.message)
    }
  }

  function startSession () {
    const selectedFilename = selectEl.value
    if (!selectedFilename) {
      showError('Please select a lesson first.')
      return
    }

    try {
      const lessonPath = path.join(lessonsDir, selectedFilename)
      const lessonJson = JSON.parse(fs.readFileSync(lessonPath, 'utf8'))

      ipcRenderer.send('lesson-selected', { lessonJson })
    } catch (err) {
      showError('Could not load lesson: ' + err.message)
    }
  }

  function showError (message) {
    errorMsg.textContent = message
    errorMsg.style.display = 'block'
  }

  // Update hotkey hint based on platform
  if (process.platform !== 'darwin') {
    document.querySelector('.hotkey-hint').innerHTML =
      'Press <kbd>Ctrl Shift Space</kbd> during class to activate'
  }

  loadLessons()
</script>
</body>
</html>
